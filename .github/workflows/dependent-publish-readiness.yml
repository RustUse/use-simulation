name: Dependent Publish Readiness

"on":
    workflow_dispatch:
        inputs:
            wave-one-ready:
                description: Confirm the Wave 1 crates are live on crates.io
                required: true
                type: boolean

permissions:
    contents: read

jobs:
    dependent-release-readiness:
        if: ${{ inputs.wave-one-ready }}
        name: Wave 2 Dry Runs
        runs-on: ubuntu-latest
        env:
            REQUIRED_CRATES: >-
                use-state-step use-simulation-clock use-seed use-event-simulation use-simulation-result
            DEPENDENT_CRATES: >-
                use-monte-carlo use-random-walk
        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Install stable Rust toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  rustflags: ""
                  cache-workspaces: |
                      . -> target

            - name: Confirm Wave 1 crates are visible on crates.io
              run: |
                  for crate in $REQUIRED_CRATES; do
                    curl --fail --silent --show-error "https://crates.io/api/v1/crates/${crate}" > /dev/null
                  done

            - name: Dry-run publish Wave 2 crates
              run: |
                  for crate in $DEPENDENT_CRATES; do
                    cargo package --list -p "$crate"
                    cargo publish --dry-run --allow-dirty -p "$crate"
                  done
