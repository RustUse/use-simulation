[workspace]
release = false
release_always = false
changelog_update = false
pr_labels = ["release"]
max_analyze_commits = 2000

[[package]]
name = "use-state-step"
release = true
version_group = "rustuse-simulation"

[[package]]
name = "use-simulation-clock"
release = true
version_group = "rustuse-simulation"

[[package]]
name = "use-seed"
release = true
version_group = "rustuse-simulation"

[[package]]
name = "use-monte-carlo"
release = true
version_group = "rustuse-simulation"

[[package]]
name = "use-random-walk"
release = true
version_group = "rustuse-simulation"

[[package]]
name = "use-event-simulation"
release = true
version_group = "rustuse-simulation"

[[package]]
name = "use-simulation-result"
release = true
version_group = "rustuse-simulation"

[[package]]
name = "use-simulation"
release = true
version_group = "rustuse-simulation"
changelog_update = true
changelog_path = "./CHANGELOG.md"
changelog_include = [
  "use-state-step",
  "use-simulation-clock",
  "use-seed",
  "use-monte-carlo",
  "use-random-walk",
  "use-event-simulation",
  "use-simulation-result",
]

[changelog]
header = """# Changelog

## Unreleased
"""
protect_breaking_commits = true
sort_commits = "oldest"
commit_parsers = [
  { message = "^feat(?:\\([^)]+\\))?!?: .+", group = "Added" },
  { message = "^fix(?:\\([^)]+\\))?!?: .+", group = "Fixed" },
  { message = "^security(?:\\([^)]+\\))?!?: .+", group = "Security" },
  { message = "^(?:refactor|perf|change)(?:\\([^)]+\\))?!?: .+", group = "Changed" },
  { message = "^docs(?:\\([^)]+\\))?!?: .+", group = "Documentation" },
  { message = "^(?:build|ci|chore|deps|test)(?:\\([^)]+\\))?!?: .+", group = "Tooling" },
  { footer = "^changelog: ?ignore$", skip = true },
  { message = "^.*", group = "Changed" },
]